<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ammu ❤️</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
color:white;
}

h1{
margin-top:80px;
font-size:3em;
animation:fadeIn 2s;
}

p{
font-size:1.4em;
animation:fadeIn 3s;
}

button{
padding:15px 30px;
font-size:1.2em;
border:none;
border-radius:25px;
background:#ff6f91;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
}

.message{
display:none;
font-size:1.6em;
margin-top:20px;
animation:fadeIn 2s;
}

/* floating hearts */

.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(45deg);
animation:float 6s infinite;
}

.heart::before,.heart::after{
content:"";
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
}

.heart::before{top:-10px;}
.heart::after{left:-10px;}

@keyframes float{
0%{transform:translateY(100vh) rotate(45deg);opacity:1;}
100%{transform:translateY(-10vh) rotate(45deg);opacity:0;}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* cake */

#cake{
position:fixed;
bottom:-200px;
left:50%;
transform:translateX(-50%);
font-size:120px;
transition:1s;
}

/* payasam */

#payasam{
position:fixed;
right:-200px;
bottom:40px;
font-size:100px;
transition:1s;
}

#caption{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:1.4em;
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday Ammu 🎉</h1>
<p>Wishing you love, happiness and sweet moments ❤️</p>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div class="message" id="msg">
You are the heart of our family 💖
</div>

<div id="cake">🎂</div>
<div id="payasam">🥣</div>
<div id="caption">Cake and Payasam just for you Ammu 💛</div>

<script>

function showSurprise(){

document.getElementById("msg").style.display="block";

setTimeout(function(){
document.getElementById("cake").style.bottom="120px";
},500);

setTimeout(function(){
document.getElementById("payasam").style.right="40px";
},1200);

setTimeout(function(){
document.getElementById("caption").style.display="block";
},1800);

}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
